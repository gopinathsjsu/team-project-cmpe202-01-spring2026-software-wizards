version: "3.9"

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: eventhub
      POSTGRES_PASSWORD: eventhub_pass
      POSTGRES_DB: eventhub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eventhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./eventhub-api
    env_file:
      - ./eventhub-api/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://eventhub:eventhub_pass@db:5432/eventhub
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./eventhub-api:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  ui:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./eventhub-ui:/app
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      VITE_API_URL: http://localhost:8000

volumes:
  postgres_data:
